name: Build and publish APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'assets/**'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build JellyWatch
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set release tag
        id: release_tag
        run: |
          echo "BUILD_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Validate signing secrets
        run: |
          if [ -z "${KEYSTORE_PASSWORD}" ] || [ -z "${KEY_ALIAS}" ]; then
            echo "Missing required secrets KEYSTORE_PASSWORD and/or KEY_ALIAS."
            exit 1
          fi

      - name: Build and lint
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Prepare APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/JellyWatch-${BUILD_TAG}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyWatch-${{ steps.release_tag.outputs.tag }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$BUILD_TAG" >/dev/null 2>&1; then
            gh release upload "$BUILD_TAG" dist/*.apk --clobber
          else
            gh release create "$BUILD_TAG" dist/*.apk --target "$GITHUB_SHA" --generate-notes --title "JellyWatch $BUILD_TAG"
          fi
