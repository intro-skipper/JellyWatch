name: Build and publish APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build JellyWatch
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate signing secrets
        run: |
          if [ -z "${KEYSTORE_PASSWORD}" ] || [ -z "${KEY_ALIAS}" ]; then
            echo "Missing required secrets KEYSTORE_PASSWORD and/or KEY_ALIAS."
            exit 1
          fi

      - name: Build and lint
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Prepare APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/JellyWatch-${GITHUB_REF_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyWatch-${{ github.ref_name }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.apk --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.apk --generate-notes --title "JellyWatch $GITHUB_REF_NAME"
          fi
